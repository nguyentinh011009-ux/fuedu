<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quản Lý Chi Tiêu</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- MÀN HÌNH ĐĂNG NHẬP (GIỮ NGUYÊN) -->
    <div id="auth-overlay" class="auth-wrapper"> ... </div>

    <!-- HEADER -->
    <header id="main-header">
        <div class="logo-container">
            <img src="https://res.cloudinary.com/dsnlbzjby/image/upload/q_auto/f_auto/v1779194252/ChatGPT_Image_19_26_47_19_thg_5_2026_x7nng0.png" alt="Logo" class="header-logo" width="35">
            <h1 id="header-title">Giao dịch</h1>
        </div>
        <div class="header-actions" id="header-actions">
            <i class="fas fa-search" id="btn-search"></i>
            <i class="fas fa-plus-circle" id="btn-add-transaction"></i>
        </div>
    </header>

    <!-- NỘI DUNG CHÍNH -->
    <main id="main-content">
        
        <!-- TAB 1: GIAO DỊCH (ĐÃ GỘP) -->
        <section id="tab-transactions" class="tab-content active">
            <div id="search-filter-bar" class="search-bar hidden"> ... </div>
            
            <div class="tx-toggle-container">
                <div class="tx-toggle">
                    <button class="toggle-btn active" data-type="expense">Tiền Chi</button>
                    <button class="toggle-btn" data-type="income">Tiền Thu</button>
                </div>
            </div>

            <!-- Dữ liệu thật sẽ được JS đổ vào đây -->
            <div class="wallet-summary-scroll" id="wallet-summary-container">
                <p class="loading-text">Đang tải số dư...</p>
            </div>

            <h3 class="section-title">Lịch sử giao dịch</h3>
            <!-- Dữ liệu thật sẽ được JS đổ vào đây -->
            <div class="transaction-list" id="transaction-list-container">
                <p class="loading-text">Đang tải giao dịch...</p>
            </div>
        </section>

        <!-- TAB 2: NGUỒN TIỀN -->
        <section id="tab-wallets" class="tab-content">
            <button class="btn-primary w-100" id="btn-add-wallet" style="margin-bottom: 20px;">
                <i class="fas fa-plus"></i> Thêm Nguồn Tiền
            </button>
            <!-- Dữ liệu thật sẽ được JS đổ vào đây -->
            <div class="wallet-list" id="wallet-list-container">
                <p class="loading-text">Đang tải nguồn tiền...</p>
            </div>
        </section>

        <!-- TAB 3: ĐIỀU CHUYỂN -->
        <section id="tab-transfer" class="tab-content"> ... </section>

        <!-- TAB 4: TÀI KHOẢN (CÀI ĐẶT) -->
        <section id="tab-profile" class="tab-content"> ... </section>
    </main>

    <!-- BOTTOM NAVIGATION (4 TABS) -->
    <nav id="bottom-nav">
        <div class="nav-item active" data-target="tab-transactions" data-title="Giao dịch">
            <i class="fas fa-exchange-alt"></i><span>Giao dịch</span>
        </div>
        <div class="nav-item" data-target="tab-wallets" data-title="Nguồn tiền">
            <i class="fas fa-wallet"></i><span>Ví tiền</span>
        </div>
        <div class="nav-item" data-target="tab-transfer" data-title="Điều chuyển">
            <i class="fas fa-random"></i><span>Chuyển</span>
        </div>
        <div class="nav-item" data-target="tab-profile" data-title="Tài khoản">
            <i class="fas fa-user-cog"></i><span>Cài đặt</span>
        </div>
    </nav>

    <!-- POPUP MODALS -->
    <div id="modal-add-transaction" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <h2 id="modal-tx-title">Thêm Giao Dịch</h2>
            <div class="modal-body">
                <input type="number" placeholder="0" class="input-amount-large" id="tx-amount">
                
                <div class="form-group">
                    <label>Loại giao dịch</label>
                    <select class="form-control" id="tx-type-select">
                        <option value="expense">Khoản Chi (-)</option>
                        <option value="income">Khoản Thu (+)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Phân loại (Tag)</label>
                    <input type="text" class="form-control" id="tx-tag" placeholder="VD: Ăn uống, Mua sắm...">
                </div>
                
                <div class="form-group">
                    <label>Nguồn tiền</label>
                    <select class="form-control" id="tx-wallet"></select>
                </div>
                
                <div class="form-group">
                    <label>Ghi chú</label>
                    <input type="text" class="form-control" id="tx-note" placeholder="Nhập ghi chú...">
                </div>
                
                <button class="btn-primary w-100 mt-3" id="btn-save-tx">Thêm giao dịch</button>
            </div>
        </div>
    </div>

    <div id="modal-add-wallet" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <h2>Thêm Nguồn Tiền</h2>
            <div class="modal-body">
                <div class="form-group">
                    <label>Loại nguồn tiền</label>
                    <select class="form-control" id="wallet-type">
                        <option value="cash">Tiền mặt</option>
                        <option value="bank">Tài khoản Ngân hàng</option>
                        <option value="saving">Tài khoản Tiết kiệm</option>
                    </select>
                </div>
                
                <div class="form-group" id="bank-select-group" style="display: none;">
                    <label>Chọn Ngân hàng</label>
                    <select class="form-control" id="wallet-bank-name"></select>
                </div>
                
                <div class="form-group">
                    <label>Số tiền ban đầu</label>
                    <input type="number" class="form-control" placeholder="0" id="wallet-amount">
                </div>
                <button class="btn-primary w-100 mt-3" id="btn-save-wallet">Lưu Nguồn Tiền</button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script type="module" src="banks.js"></script>
    <script type="module" src="auth.js"></script>
    <script type="module" src="app.js"></script>
</body>
</html>
