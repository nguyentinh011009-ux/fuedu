<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản trị Giáo Viên - FUEdu</title>
    <link rel="stylesheet" href="style.css">
    <!-- Thư viện xuất PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body data-page="teacher">
    <!-- Màn hình Đăng nhập (Giữ nguyên) -->
    <div id="login-section" class="login-screen">
        <img src="https://res.cloudinary.com/dsnlbzjby/image/upload/q_auto/f_auto/v1777733568/ChatGPT_Image_21_41_38_2_thg_5__2026-removebg-preview_cdoroq.png" alt="FUEdu Logo">
        <h2>Cổng Quản Trị Giáo Viên FUEdu</h2>
        <button id="btnLogin" class="btn btn-primary" style="margin-top: 15px;">Đăng nhập bằng Google</button>
    </div>

    <!-- Màn hình Quản trị -->
    <div id="app-section" class="hidden">
        <header>
            <div class="logo"><img src="https://res.cloudinary.com/dsnlbzjby/image/upload/q_auto/f_auto/v1777733568/ChatGPT_Image_21_41_38_2_thg_5__2026-removebg-preview_cdoroq.png" alt="Logo"></div>
            <div class="user-info">
                <span id="userEmail"></span>
            </div>
        </header>

        <div class="admin-container">
            <!-- Sidebar -->
            <div class="sidebar">
                <button class="tab-btn active" data-target="tab-create">1. Tạo bài tập</button>
                <button class="tab-btn" data-target="tab-settings">2. Cài đặt kiểm tra</button>
                <button class="tab-btn" data-target="tab-manage">3. Quản lý kiểm tra</button>
                <button class="tab-btn" data-target="tab-students">4. Quản lý học sinh</button>
                <button class="tab-btn" id="btnSidebarLogout" style="color: red;">5. Đăng xuất</button>
            </div>

            <!-- TAB 1: TẠO BÀI TẬP (Giữ nguyên form, thêm preview) -->
            <div id="tab-create" class="tab-content active">
                <h2>Tạo Bài Tập / Đề Thi Mới</h2>
                <div class="card mt-20">
                    <div class="form-group"><label>Môn học</label><select id="subject" class="form-control"><option value="Tiếng Anh">Tiếng Anh</option><option value="Khác">Khác</option></select><input type="text" id="otherSubject" class="form-control hidden" placeholder="Nhập tên môn học" style="margin-top: 10px;"></div>
                    <div class="form-group"><label>Khối lớp</label><select id="grade" class="form-control"><option>10</option><option>11</option><option>12</option></select></div>
                    <div class="form-group"><label>Tên đề</label><input type="text" id="examName" class="form-control"></div>
                    <div class="form-group"><label>Loại đề</label><select id="examType" class="form-control"><option>ĐỀ MINH HỌA</option><option>ĐỀ CHÍNH THỨC</option><option>KHÔNG</option></select></div>
                    <hr style="margin: 20px 0;">
                    <div id="sections-container"></div>
                    <button id="btnAddSection" class="btn btn-primary">+ Thêm Phần</button>
                    <button id="btnSaveExam" class="btn btn-primary" style="background-color: #28a745;">Nhận diện & Lưu Đề</button>
                </div>
            </div>

            <!-- TAB 2: CÀI ĐẶT KIỂM TRA -->
            <div id="tab-settings" class="tab-content">
                <h2>Cài đặt kiểm tra</h2>
                <div class="card mt-20">
                    <div class="form-group"><label>Chọn đề thi</label><select id="selectExamSetting" class="form-control"><option>Đang tải danh sách đề...</option></select></div>
                    <div class="form-group"><label>Thời gian làm bài (Phút)</label><input type="number" id="timeLimit" class="form-control" placeholder="VD: 45"></div>
                    <div class="form-group"><label>Thời gian mở đề</label><input type="datetime-local" id="openTime" class="form-control"></div>
                    <div class="form-group"><label>Thời gian đóng đề</label><input type="datetime-local" id="closeTime" class="form-control"></div>
                    <div class="form-group"><label>Đối tượng thi</label><select id="accessType" class="form-control"><option value="public">Ai có link cũng làm được</option><option value="private">Chỉ học sinh được chỉ định</option></select></div>
                    <button class="btn btn-primary" id="btnPublishExam">Xuất bản đề thi</button>
                    <button class="btn btn-primary" id="btnExportPDF" style="background-color: #ff9800;">Xuất PDF</button>
                </div>
            </div>

            <!-- TAB 3: QUẢN LÝ KIỂM TRA -->
            <div id="tab-manage" class="tab-content">
                <h2>Quản lý bài kiểm tra</h2>
                <div class="card mt-20">
                    <select id="selectExamManage" class="form-control"><option>Chọn đề thi để xem kết quả...</option></select>
                    <table style="width: 100%; margin-top: 20px; border-collapse: collapse;" border="1">
                        <thead><tr><th>Học sinh</th><th>Trạng thái</th><th>Điểm Trắc nghiệm</th><th>Chấm Tự luận</th></tr></thead>
                        <tbody id="studentResultsTable">
                            <tr><td colspan="4" style="text-align:center;">Chưa có dữ liệu</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- TAB 4: QUẢN LÝ HỌC SINH -->
            <div id="tab-students" class="tab-content">
                <h2>Quản lý tài khoản học sinh</h2>
                <div class="card mt-20" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <input type="email" id="stuEmail" class="form-control" placeholder="Email (bắt buộc)">
                    <input type="text" id="stuName" class="form-control" placeholder="Họ và Tên">
                    <input type="text" id="stuClass" class="form-control" placeholder="Lớp (VD: 11A1)">
                    <input type="text" id="stuPhone" class="form-control" placeholder="Số điện thoại">
                    <input type="date" id="stuDob" class="form-control">
                    <select id="stuGender" class="form-control"><option value="Nam">Nam</option><option value="Nữ">Nữ</option></select>
                    <button id="btnAddStudent" class="btn btn-primary" style="grid-column: span 2;">Thêm / Cập nhật Học sinh</button>
                </div>
                <h3>Danh sách học sinh</h3>
                <table style="width: 100%; margin-top: 10px; border-collapse: collapse; background: white;" border="1">
                    <thead><tr><th>Email</th><th>Họ Tên</th><th>Lớp</th><th>SĐT</th></tr></thead>
                    <tbody id="studentListTable"></tbody>
                </table>
            </div>
        </div>
    </div>
    <script type="module" src="app.js"></script>
</body>
</html>
